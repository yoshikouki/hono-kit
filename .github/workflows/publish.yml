name: Publish packages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "bun.lock"
      - "package.json"
      - "packages/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify changed package versions
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bun run release:check "$BASE_SHA" "$HEAD_SHA"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Build and inspect package tarballs
        run: bun run release:pack

      - name: Upload package tarballs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-packages
          path: |
            .release/release-manifest.json
            .release/tarballs/*.tgz
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish unpublished versions
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm-publish
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Checkout publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: scripts/publish-tarballs.mjs
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download package tarballs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: npm-packages
          path: .release

      - name: Publish packages with npm Trusted Publishing
        run: node ./scripts/publish-tarballs.mjs .release/release-manifest.json
